<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before / After — Retail Calendar Automation</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #0e0420;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wrap {
    position: relative;
    width: 960px;
    height: 540px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 40px 100px rgba(0,0,0,.7),
      0 0 0 1px rgba(255,255,255,.07);
    cursor: col-resize;
    user-select: none;
  }

  /* ── Layers ── */
  .layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .layer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: left top;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* Before: desaturated + dim */
  .layer-before img {
    filter: saturate(0.1) brightness(0.55);
  }

  /* After: revealed by clip-path, controlled by JS */
  .layer-after {
    clip-path: inset(0 50% 0 0);
  }

  /* ── Wipe line ── */
  .wipe-line {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 2px;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(255,255,255,.9);
    box-shadow:
      0 0 16px rgba(255,255,255,.5),
      0 0 4px  rgba(255,255,255,1);
    pointer-events: none;
  }

  /* Handle */
  .handle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 34px; height: 34px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,.45);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .arr {
    width: 0; height: 0;
    border-top: 3px solid transparent;
    border-bottom: 3px solid transparent;
  }
  .arr-l { border-right: 5px solid #7563ff; }
  .arr-r { border-left:  5px solid #7563ff; }

  /* ── Caption ── */
  .caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 12px 20px;
    background: linear-gradient(to top, rgba(0,0,0,.65) 0%, transparent 100%);
    display: flex;
    justify-content: space-between;
    z-index: 25;
    pointer-events: none;
  }
  .caption span {
    font-family: -apple-system, 'Inter', 'Helvetica Neue', sans-serif;
    font-size: 11px;
    letter-spacing: .03em;
  }
  .caption-before { color: rgba(255,255,255,.4); }
  .caption-after  { color: rgba(255,255,255,.7); }
</style>
</head>
<body>
  <div class="wrap" id="wrap">

    <div class="layer layer-before">
      <img src="screen-excel-spreadsheet.png" alt="Before">
    </div>

    <div class="layer layer-after" id="layerAfter">
      <img src="screen-1a-master-roadmap.png" alt="After">
    </div>

    <div class="wipe-line" id="wipeLine">
      <div class="handle">
        <div class="arr arr-l"></div>
        <div class="arr arr-r"></div>
      </div>
    </div>

    <div class="caption">
      <span class="caption-before">Excel — manual pricing roadmap</span>
      <span class="caption-after">Retail Calendar Automation Platform</span>
    </div>

  </div>

  <script>
    const wrap      = document.getElementById('wrap');
    const layerAfter = document.getElementById('layerAfter');
    const wipeLine  = document.getElementById('wipeLine');

    function setPos(pct) {
      pct = Math.max(0, Math.min(100, pct));
      layerAfter.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
      wipeLine.style.left = pct + '%';
    }

    function getPos(e) {
      const rect = wrap.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      return ((clientX - rect.left) / rect.width) * 100;
    }

    let dragging = false;

    wrap.addEventListener('mousedown',  e => { dragging = true; setPos(getPos(e)); });
    wrap.addEventListener('touchstart', e => { dragging = true; setPos(getPos(e)); }, { passive: true });

    window.addEventListener('mousemove',  e => { if (dragging) setPos(getPos(e)); });
    window.addEventListener('touchmove',  e => { if (dragging) setPos(getPos(e)); }, { passive: true });

    window.addEventListener('mouseup',  () => dragging = false);
    window.addEventListener('touchend', () => dragging = false);
  </script>
</body>
</html>
