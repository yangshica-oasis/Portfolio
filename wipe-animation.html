<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before / After — Retail Calendar Automation</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #0e0420;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wrap {
    position: relative;
    width: 960px;
    height: 540px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 40px 100px rgba(0,0,0,.7),
      0 0 0 1px rgba(255,255,255,.07);
    cursor: col-resize;
    user-select: none;
  }

  .layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .layer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: left top;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* After: normal color, full width, sits below */
  .layer-after { z-index: 1; }

  /* Before: purple-tinted, sits on top, clipped to left portion */
  .layer-before {
    z-index: 2;
    clip-path: inset(0 50% 0 0);
  }
  .layer-before::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(84, 7, 170, 0.08);
    pointer-events: none;
  }

  /* Wipe line */
  .wipe-line {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 2px;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(255,255,255,.85);
    box-shadow: 0 0 12px rgba(255,255,255,.4), 0 0 3px rgba(255,255,255,1);
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Simple chevrons — no circle */
  .handle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 2px;
  }
  .arr {
    width: 0; height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,.5));
  }
  .arr-l { border-right: 8px solid rgba(255,255,255,.95); }
  .arr-r { border-left:  8px solid rgba(255,255,255,.95); }

  /* Caption */
  .caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 12px 20px;
    background: linear-gradient(to top, rgba(0,0,0,.6) 0%, transparent 100%);
    display: flex;
    justify-content: space-between;
    z-index: 25;
    pointer-events: none;
  }
  .caption span {
    font-family: -apple-system, 'Inter', 'Helvetica Neue', sans-serif;
    font-size: 11px;
    letter-spacing: .03em;
  }
  .caption-before { color: rgba(255,255,255,.45); }
  .caption-after  { color: rgba(255,255,255,.75); }
</style>
</head>
<body>
  <div class="wrap" id="wrap">

    <!-- After: sits below, full color -->
    <div class="layer layer-after">
      <img src="screen-1a-master-roadmap.png" alt="After">
    </div>

    <!-- Before: grey, clipped to left, sits on top -->
    <div class="layer layer-before" id="layerBefore">
      <img src="screen-excel-spreadsheet.png" alt="Before">
    </div>

    <div class="wipe-line" id="wipeLine">
      <div class="handle">
        <div class="arr arr-l"></div>
        <div class="arr arr-r"></div>
      </div>
    </div>

    <div class="caption">
      <span class="caption-before">Before — Excel manual pricing</span>
      <span class="caption-after">After — Retail Calendar Automation</span>
    </div>

  </div>

  <script>
    const wrap        = document.getElementById('wrap');
    const layerBefore = document.getElementById('layerBefore');
    const wipeLine    = document.getElementById('wipeLine');

    function setPos(pct) {
      pct = Math.max(0, Math.min(100, pct));
      layerBefore.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
      wipeLine.style.left = pct + '%';
    }

    function getPos(e) {
      const rect = wrap.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      return ((clientX - rect.left) / rect.width) * 100;
    }

    let dragging = false;

    wrap.addEventListener('mousedown',  e => { dragging = true; setPos(getPos(e)); });
    wrap.addEventListener('touchstart', e => { dragging = true; setPos(getPos(e)); }, { passive: true });

    window.addEventListener('mousemove',  e => { if (dragging) setPos(getPos(e)); });
    window.addEventListener('touchmove',  e => { if (dragging) setPos(getPos(e)); }, { passive: true });

    window.addEventListener('mouseup',  () => dragging = false);
    window.addEventListener('touchend', () => dragging = false);
  </script>
</body>
</html>
